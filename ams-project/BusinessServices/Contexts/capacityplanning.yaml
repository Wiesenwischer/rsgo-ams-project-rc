# CapacityPlanning Context Fragment

metadata:
  name: CapacityPlanning
  description: Capacity Planning bounded context services

services:
  capacityplanning-migrator:
    image: amssolution/capacityplanning.migrator:linux-v3.1.0-rc
    containerName: capacityplanning-migrator
    lifecycle: init
    environment:
      DB_SERVER: ${DB_SERVER}
      DB_NAME: ${DB_NAME}
      DB_PARAMS: ${DB_PARAMS}
      DB_ADMIN_USER: ${DB_ADMIN_USER}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
    networks:
      - ams-project-backend

  capacityplanning-api:
    image: amssolution/capacityplanning.api:linux-v3.1.0-rc
    containerName: capacityplanning-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME: ${DB_NAME}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  capacityplanning-readmodelgenerator:
    image: amssolution/capacityplanning.readmodelgenerator:linux-v3.1.0-rc
    containerName: capacityplanning-readmodelgenerator
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME: ${DB_NAME}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      QUEUE_PEEKER_DELAY_MS: "1000"
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s


networks:
  ams-project-backend:
    external: true
